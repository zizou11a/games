<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Playx</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b14;--surf:#0f1420;--surf2:#161d2e;--border:#1e2a40;--blue:#3b82f6;--orange:#f97316;--text:#94a3b8;--bright:#e2e8f0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit;text-decoration:none}

/* Animated background */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 65%);pointer-events:none}

nav{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(8,11,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:10}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(90deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-logo span{color:var(--orange);-webkit-text-fill-color:var(--orange)}

.content{text-align:center;position:relative;z-index:1;max-width:520px}

/* Glitchy 404 */
.error-num{font-family:'Syne',sans-serif;font-size:clamp(80px,20vw,160px);font-weight:800;line-height:1;color:var(--bright);letter-spacing:-6px;position:relative;animation:glitch 4s infinite}
.error-num::before,.error-num::after{content:'404';position:absolute;inset:0;background:var(--bg)}
.error-num::before{color:#3b82f6;clip:rect(0,900px,0,0);animation:glitch-1 4s infinite}
.error-num::after{color:#f97316;clip:rect(0,900px,0,0);animation:glitch-2 4s infinite}
@keyframes glitch{0%,90%,100%{transform:translate(0)}92%{transform:translate(-3px,1px)}94%{transform:translate(3px,-1px)}96%{transform:translate(-2px,2px)}}
@keyframes glitch-1{0%,89%,100%{clip:rect(0,0,0,0);transform:translate(0)}90%{clip:rect(20px,9999px,60px,0);transform:translate(-4px,0)}92%{clip:rect(80px,9999px,100px,0);transform:translate(4px,0)}94%{clip:rect(40px,9999px,70px,0);transform:translate(-2px,0)}}
@keyframes glitch-2{0%,89%,100%{clip:rect(0,0,0,0);transform:translate(0)}91%{clip:rect(50px,9999px,90px,0);transform:translate(4px,0)}93%{clip:rect(10px,9999px,40px,0);transform:translate(-4px,0)}95%{clip:rect(70px,9999px,110px,0);transform:translate(2px,0)}}

.error-icon{font-size:48px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.error-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--bright);margin-bottom:12px;letter-spacing:-0.5px}
.error-sub{font-size:16px;color:var(--text);line-height:1.7;max-width:380px;margin:0 auto 32px}

.error-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
.btn-home{padding:13px 28px;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:8px}
.btn-home:hover{background:#2563eb;transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.3)}
.btn-ghost{padding:13px 24px;border-radius:10px;background:transparent;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-ghost:hover{border-color:var(--blue);color:var(--bright)}

/* Mini game */
.mini-game-wrap{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:8px}
.mini-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
#mini-canvas{border-radius:8px;display:block;margin:0 auto;background:#080b14;cursor:pointer}
.mini-hint{font-size:12px;color:var(--text);margin-top:10px;text-align:center}
.mini-score{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--bright);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav>
  <a href="playx.html" class="nav-logo">Play<span>x</span></a>
</nav>

<div class="content">
  <div class="error-icon">🎮</div>
  <div class="error-num">404</div>
  <div class="error-title">Level Not Found</div>
  <p class="error-sub">Looks like this page got deleted, moved, or never existed. Don't worry — there are plenty of real games waiting for you.</p>

  <div class="error-actions">
    <a href="playx.html"><button class="btn-home">🏠 Back to Home</button></a>
    <a href="games.html"><button class="btn-ghost">🎮 Browse Games</button></a>
  </div>

  <!-- Mini Snake Game -->
  <div class="mini-game-wrap">
    <div class="mini-label">🐍 While you're here — play Mini Snake!</div>
    <canvas id="mini-canvas" width="320" height="180"></canvas>
    <div class="mini-score">Score: <span id="mini-score">0</span> · Best: <span id="mini-best">0</span></div>
    <div class="mini-hint">Click or tap to start · Arrow keys or swipe to move</div>
  </div>
</div>

<script>
// Mini Snake Game on 404 page
const canvas = document.getElementById('mini-canvas');
const ctx    = canvas.getContext('2d');
const W = 320, H = 180, CELL = 16;
const COLS = W / CELL, ROWS = H / CELL;

let snake, dir, nextDir, food, score, best = parseInt(localStorage.getItem('snake_best')||'0'), running = false, gameOver = false, loop;

document.getElementById('mini-best').textContent = best;

function init() {
  snake   = [{x:5,y:5},{x:4,y:5},{x:3,y:5}];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0;
  gameOver = false;
  placeFood();
  document.getElementById('mini-score').textContent = 0;
}

function placeFood() {
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall wrap
  head.x = (head.x + COLS) % COLS;
  head.y = (head.y + ROWS) % ROWS;

  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('mini-score').textContent = score;
    placeFood();
    if (score > best) { best = score; localStorage.setItem('snake_best', best); document.getElementById('mini-best').textContent = best; }
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  // BG
  ctx.fillStyle = '#080b14';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(30,42,64,0.5)';
  ctx.lineWidth = .5;
  for (let x=0;x<COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for (let y=0;y<ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

  // Snake
  snake.forEach((s,i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i===0 ? '#3b82f6' : `rgba(59,130,246,${alpha})`;
    ctx.shadowBlur = i===0 ? 10 : 0;
    ctx.shadowColor = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, i===0?4:2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Food
  ctx.fillStyle = '#f97316';
  ctx.shadowBlur = 12; ctx.shadowColor = '#f97316';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawStart() {
  ctx.fillStyle = '#080b14'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 14px Syne, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Click to Start', W/2, H/2 - 8);
  ctx.font = '11px DM Sans, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('Arrow keys / swipe to move', W/2, H/2 + 12);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(8,11,20,0.85)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 20px Syne, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Game Over', W/2, H/2 - 20);
  ctx.font = '13px DM Sans, sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(`Score: ${score}`, W/2, H/2 + 4);
  ctx.fillText('Click to restart', W/2, H/2 + 22);
}

function startGame() {
  if (running) return;
  running = true;
  init(); draw();
  loop = setInterval(step, 130);
}

function endGame() {
  running = false; gameOver = true;
  clearInterval(loop);
  drawGameOver();
}

canvas.addEventListener('click', () => {
  if (!running || gameOver) { running = false; startGame(); }
});

// Arrow keys
document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if (map[e.key]) {
    e.preventDefault();
    const d = map[e.key];
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    if (!running) startGame();
  }
});

// Touch / swipe
let tx=0,ty=0;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) nextDir = dx>0?{x:1,y:0}:{x:-1,y:0};
  else nextDir = dy>0?{x:0,y:1}:{x:0,y:-1};
  if (!running) startGame();
},{passive:false});

drawStart();
</script>
</body>
</html>
