<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Playx</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--surf:#0f1420;--surf2:#161d2e;--border:#1e2a40;
  --blue:#3b82f6;--orange:#f97316;--green:#10b981;--purple:#8b5cf6;
  --gold:#fbbf24;--text:#94a3b8;--bright:#e2e8f0;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(8,11,20,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(90deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-logo span{color:var(--orange);-webkit-text-fill-color:var(--orange)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-back{font-size:13px;color:var(--text);padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:all .2s}
.nav-back:hover{border-color:var(--blue);color:var(--blue)}

.page{max-width:900px;margin:0 auto;padding:36px 24px 80px}

/* Header */
.lb-header{text-align:center;margin-bottom:40px}
.lb-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.lb-title{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--bright);letter-spacing:-1.5px;margin-bottom:8px}
.lb-sub{font-size:15px;color:var(--text)}

/* Podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:40px;padding:0 20px}
.podium-spot{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;max-width:180px}
.podium-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid transparent;position:relative}
.podium-avatar.gold{border-color:var(--gold);background:rgba(251,191,36,0.1)}
.podium-avatar.silver{border-color:#94a3b8;background:rgba(148,163,184,0.1)}
.podium-avatar.bronze{border-color:#b45309;background:rgba(180,83,9,0.1)}
.podium-crown{position:absolute;top:-14px;font-size:18px}
.podium-name{font-size:13px;font-weight:700;color:var(--bright);text-align:center}
.podium-score{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.podium-score.gold{color:var(--gold)}
.podium-score.silver{color:#94a3b8}
.podium-score.bronze{color:#b45309}
.podium-block{border-radius:12px 12px 0 0;width:100%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:rgba(255,255,255,0.15)}
.podium-block.gold{background:linear-gradient(180deg,rgba(251,191,36,0.15),rgba(251,191,36,0.05));border:1px solid rgba(251,191,36,0.2);border-bottom:none;height:100px}
.podium-block.silver{background:linear-gradient(180deg,rgba(148,163,184,0.1),rgba(148,163,184,0.03));border:1px solid rgba(148,163,184,0.15);border-bottom:none;height:80px}
.podium-block.bronze{background:linear-gradient(180deg,rgba(180,83,9,0.1),rgba(180,83,9,0.03));border:1px solid rgba(180,83,9,0.15);border-bottom:none;height:65px}

/* Game tabs */
.game-tabs{display:flex;gap:6px;background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:6px;margin-bottom:24px;overflow-x:auto}
.game-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;border:none;background:transparent}
.game-tab:hover{color:var(--bright)}
.game-tab.active{background:var(--blue);color:#fff}

/* Time tabs */
.time-tabs{display:flex;gap:4px;margin-bottom:20px}
.time-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text);transition:all .2s;border:1px solid var(--border);background:var(--surf);font-family:'DM Sans',sans-serif}
.time-tab.active{background:var(--surf2);border-color:var(--blue);color:var(--bright)}

/* Table */
.lb-table{background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
.lb-table-header{display:grid;grid-template-columns:56px 1fr 120px 100px;gap:0;padding:12px 20px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text)}
.lb-row{display:grid;grid-template-columns:56px 1fr 120px 100px;gap:0;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;cursor:default}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--surf2)}
.lb-row.me{background:rgba(59,130,246,0.06);border-left:3px solid var(--blue)}
.lb-rank{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text);display:flex;align-items:center}
.lb-rank.r1{color:var(--gold)}
.lb-rank.r2{color:#94a3b8}
.lb-rank.r3{color:#b45309}
.lb-player{display:flex;align-items:center;gap:10px}
.lb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#1e2a5f);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-pname{font-size:14px;font-weight:600;color:var(--bright)}
.lb-plevel{font-size:11px;color:var(--text);margin-top:2px}
.lb-score-cell{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--bright)}
.lb-score-cell.top{color:var(--gold)}
.lb-badge-cell{display:flex;gap:4px;flex-wrap:wrap}
.lb-badge-mini{font-size:14px}

/* My rank card */
.my-rank-card{background:var(--surf);border:1px solid rgba(59,130,246,0.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.mr-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--blue);font-weight:700;margin-bottom:4px}
.mr-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--bright)}
.mr-sub{font-size:12px;color:var(--text);margin-top:2px}
.mr-login-prompt{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text)}
.btn-login-lb{padding:8px 18px;border-radius:8px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-login-lb:hover{background:#2563eb}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surf2) 25%,var(--border) 50%,var(--surf2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  nav{padding:0 16px}
  .page{padding:24px 14px 60px}
  .lb-table-header,.lb-row{grid-template-columns:44px 1fr 80px}
  .lb-badge-cell{display:none}
  .podium{gap:8px;padding:0}
}
</style>
</head>
<body>
<script src="seo-pwa.js"></script>
<nav>
  <a href="playx.html" class="nav-logo">Play<span>x</span></a>
  <div class="nav-right">
    <a href="playx.html" class="nav-back">← Home</a>
  </div>
</nav>

<div class="page">
  <div class="lb-header">
    <div class="lb-eyebrow">🏆 Global Rankings</div>
    <div class="lb-title">Leaderboard</div>
    <div class="lb-sub">Compete with players worldwide — updated live</div>
  </div>

  <!-- Podium (top 3) -->
  <div class="podium" id="podium">
    <!-- JS rendered -->
  </div>

  <!-- My rank -->
  <div class="my-rank-card" id="my-rank-card">
    <div id="my-rank-content"></div>
  </div>

  <!-- Game tabs -->
  <div class="game-tabs">
    <button class="game-tab active" data-game="shadow_runner">🏃 Shadow Runner</button>
    <button class="game-tab" data-game="word_blitz">📖 Word Blitz</button>
    <button class="game-tab" data-game="overall">🌟 Overall XP</button>
  </div>

  <!-- Time tabs -->
  <div class="time-tabs">
    <button class="time-tab active" data-time="today">Today</button>
    <button class="time-tab" data-time="week">This Week</button>
    <button class="time-tab" data-time="alltime">All Time</button>
  </div>

  <!-- Table -->
  <div class="lb-table">
    <div class="lb-table-header">
      <div>Rank</div><div>Player</div><div>Score</div><div>Badges</div>
    </div>
    <div id="lb-body"></div>
  </div>
</div>

<script src="sounds.js"></script>
<script src="analytics.js"></script>
<script src="xp.js"></script>
<script src="supabase.js"></script>
<script src="profilebar.js"></script>
<script src="supabase.js"></script>
<script src="auth-ui.js"></script>
<script src="auth-ui.js"></script>
<script>
// ── Mock data (replaces DB when not connected) ──
const MOCK = {
  shadow_runner: [
    {rank:1, name:'ShadowKing99',  avatar:'👑', score:1840, level:'Master',   badges:['👑','🔥','⚡']},
    {rank:2, name:'NightRunner',   avatar:'🌙', score:1720, level:'Champion', badges:['🏆','⚡']},
    {rank:3, name:'BlitzWave',     avatar:'⚡', score:1655, level:'Expert',   badges:['🔥','💎']},
    {rank:4, name:'DarkFlash',     avatar:'🎮', score:1490, level:'Pro',      badges:['⭐']},
    {rank:5, name:'SpeedDemon',    avatar:'🏃', score:1410, level:'Pro',      badges:['🔥']},
    {rank:6, name:'PixelHunter',   avatar:'🎯', score:1280, level:'Gamer',    badges:[]},
    {rank:7, name:'RunnerX',       avatar:'🚀', score:1190, level:'Gamer',    badges:['⭐']},
    {rank:8, name:'ShadowBolt',    avatar:'💨', score:1040, level:'Player',   badges:[]},
    {rank:9, name:'NeonSpeed',     avatar:'✨', score:980,  level:'Player',   badges:[]},
    {rank:10,name:'QuickStrike',   avatar:'⚡', score:870,  level:'Rookie',   badges:[]},
  ],
  word_blitz: [
    {rank:1, name:'WordWizard',    avatar:'📖', score:6,    level:'Legend',   badges:['🧠','👑'], label:'6 wins'},
    {rank:2, name:'LexiPro',       avatar:'✏️', score:5,    level:'Master',   badges:['📖']},
    {rank:3, name:'VocabKing',     avatar:'📚', score:5,    level:'Expert',   badges:['🎯']},
    {rank:4, name:'LetterMaster',  avatar:'🔤', score:4,    level:'Pro',      badges:[]},
    {rank:5, name:'SpellBound',    avatar:'✨', score:4,    level:'Gamer',    badges:[]},
  ],
  overall: [
    {rank:1, name:'XPGrinder99',   avatar:'💎', score:4820, level:'Mythic',   badges:['👑','💎','🔥'], label:'XP'},
    {rank:2, name:'PlayxChamp',    avatar:'🏆', score:3940, level:'Legend',   badges:['🏆','⚡']},
    {rank:3, name:'GrindMaster',   avatar:'⭐', score:3210, level:'Champion', badges:['💫','🔥']},
    {rank:4, name:'DailyPlayer',   avatar:'📅', score:2780, level:'Master',   badges:['🔥']},
    {rank:5, name:'AllRounder',    avatar:'🎮', score:2340, level:'Expert',   badges:[]},
    {rank:6, name:'StreakHero',    avatar:'🔥', score:1980, level:'Pro',      badges:['📅']},
    {rank:7, name:'QuizAce',       avatar:'🧠', score:1720, level:'Pro',      badges:['🧠']},
    {rank:8, name:'WordNerd',      avatar:'📖', score:1540, level:'Gamer',    badges:[]},
    {rank:9, name:'CasualGamer',   avatar:'😎', score:1230, level:'Player',   badges:[]},
    {rank:10,name:'NewcomerPro',   avatar:'🌱', score:980,  level:'Rookie',   badges:[]},
  ],
};

let activeGame = 'shadow_runner';

function renderRankCell(rank) {
  const medals = {1:'🥇',2:'🥈',3:'🥉'};
  if (medals[rank]) return `<div class="lb-rank r${rank}">${medals[rank]}</div>`;
  return `<div class="lb-rank">${rank}</div>`;
}

function renderPodium(data) {
  const top3 = data.slice(0, 3);
  const order = [top3[1], top3[0], top3[2]]; // silver, gold, bronze
  const classes = ['silver','gold','bronze'];
  const crowns = ['','👑',''];
  const heights = [80,100,65];
  const labels = ['2nd','1st','3rd'];
  document.getElementById('podium').innerHTML = order.map((p,i) => p ? `
    <div class="podium-spot">
      <div class="podium-avatar ${classes[i]}">
        ${p.avatar}
        ${crowns[i] ? `<div class="podium-crown">${crowns[i]}</div>` : ''}
      </div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score ${classes[i]}">${(p.label||p.score).toLocaleString()}</div>
      <div class="podium-block ${classes[i]}" style="height:${heights[i]}px">${labels[i]}</div>
    </div>
  ` : '<div class="podium-spot"></div>').join('');
}

function renderTable(data) {
  const local = PlayxCore.getProfile();
  document.getElementById('lb-body').innerHTML = data.map(p => `
    <div class="lb-row">
      ${renderRankCell(p.rank)}
      <div class="lb-player">
        <div class="lb-av">${p.avatar}</div>
        <div>
          <div class="lb-pname">${p.name}</div>
          <div class="lb-plevel">${p.level}</div>
        </div>
      </div>
      <div class="lb-score-cell ${p.rank===1?'top':''}">${(p.score).toLocaleString()}${p.label?' '+p.label:''}</div>
      <div class="lb-badge-cell">${p.badges.map(b=>`<span class="lb-badge-mini">${b}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderMyRank() {
  const isLoggedIn = PlayxDB.Auth.isLoggedIn();
  const content = document.getElementById('my-rank-content');
  if (isLoggedIn) {
    const p = PlayxCore.getProfile();
    const li = PlayxCore.getLevelInfo(p.totalXP);
    content.innerHTML = `
      <div style="display:flex;gap:32px;flex-wrap:wrap">
        <div><div class="mr-label">Your Rank</div><div class="mr-val">#247</div><div class="mr-sub">Top 3% globally</div></div>
        <div><div class="mr-label">Your Best</div><div class="mr-val">${p.bestScores?.shadow_runner || 0}</div><div class="mr-sub">Shadow Runner</div></div>
        <div><div class="mr-label">Total XP</div><div class="mr-val">${p.totalXP}</div><div class="mr-sub">${li.current.icon} ${li.current.title}</div></div>
      </div>
    `;
  } else {
    content.innerHTML = `
      <div class="mr-login-prompt">
        <span>🔑 Sign in to see your global rank and compete with players worldwide</span>
        <button class="btn-login-lb" onclick="openLoginModal()">Sign In</button>
      </div>
    `;
  }
}

function loadBoard() {
  const data = MOCK[activeGame];
  renderPodium(data);
  renderTable(data);
  renderMyRank();
}

// Game tabs
document.querySelectorAll('.game-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.game-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGame = btn.dataset.game;
    loadBoard();
  });
});

// Time tabs
document.querySelectorAll('.time-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadBoard();
  });
});

loadBoard();
</script>
<script src="ads.js"></script>
</body>
</html>
